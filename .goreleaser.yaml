# GoReleaser configuration for the evm-tools suite.
# Validate with `goreleaser check`; dry-run with
# `goreleaser release --snapshot --clean`.
version: 2

project_name: evm-tools

before:
  hooks:
    - go mod tidy

builds:
  - id: evm-stream
    main: ./cmd/evm-stream
    binary: evm-stream
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/daxchain-io/evm-tools/internal/buildinfo.Version={{ .Version }}
      - -X github.com/daxchain-io/evm-tools/internal/buildinfo.Commit={{ .Commit }}
      - -X github.com/daxchain-io/evm-tools/internal/buildinfo.Date={{ .Date }}

  - id: evm-balance
    main: ./cmd/evm-balance
    binary: evm-balance
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/daxchain-io/evm-tools/internal/buildinfo.Version={{ .Version }}
      - -X github.com/daxchain-io/evm-tools/internal/buildinfo.Commit={{ .Commit }}
      - -X github.com/daxchain-io/evm-tools/internal/buildinfo.Date={{ .Date }}

  # CGO stays disabled: segmentio/kafka-go is pure Go, so the static
  # cross-compiled binaries are unaffected (no confluent/cgo client).
  - id: evm-sink-kafka
    main: ./cmd/evm-sink-kafka
    binary: evm-sink-kafka
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/daxchain-io/evm-tools/internal/buildinfo.Version={{ .Version }}
      - -X github.com/daxchain-io/evm-tools/internal/buildinfo.Commit={{ .Commit }}
      - -X github.com/daxchain-io/evm-tools/internal/buildinfo.Date={{ .Date }}

  # evm-sink-webhook forwards JSONL over HTTP using only net/http, so CGO stays
  # disabled and the binary cross-compiles statically like the rest of the suite.
  - id: evm-sink-webhook
    main: ./cmd/evm-sink-webhook
    binary: evm-sink-webhook
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/daxchain-io/evm-tools/internal/buildinfo.Version={{ .Version }}
      - -X github.com/daxchain-io/evm-tools/internal/buildinfo.Commit={{ .Commit }}
      - -X github.com/daxchain-io/evm-tools/internal/buildinfo.Date={{ .Date }}

  # evm-sink-file appends JSONL to a rotating local file using only the standard
  # library (os, compress/gzip), so CGO stays disabled and it cross-compiles
  # statically like the rest of the suite.
  - id: evm-sink-file
    main: ./cmd/evm-sink-file
    binary: evm-sink-file
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/daxchain-io/evm-tools/internal/buildinfo.Version={{ .Version }}
      - -X github.com/daxchain-io/evm-tools/internal/buildinfo.Commit={{ .Commit }}
      - -X github.com/daxchain-io/evm-tools/internal/buildinfo.Date={{ .Date }}

  # The AWS sinks use aws-sdk-go-v2 (pure Go) and the Postgres sink uses pgx (pure
  # Go), so CGO stays disabled and all three cross-compile statically like the rest
  # of the suite.
  - id: evm-sink-aws-sqs
    main: ./cmd/evm-sink-aws-sqs
    binary: evm-sink-aws-sqs
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/daxchain-io/evm-tools/internal/buildinfo.Version={{ .Version }}
      - -X github.com/daxchain-io/evm-tools/internal/buildinfo.Commit={{ .Commit }}
      - -X github.com/daxchain-io/evm-tools/internal/buildinfo.Date={{ .Date }}

  - id: evm-sink-aws-sns
    main: ./cmd/evm-sink-aws-sns
    binary: evm-sink-aws-sns
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/daxchain-io/evm-tools/internal/buildinfo.Version={{ .Version }}
      - -X github.com/daxchain-io/evm-tools/internal/buildinfo.Commit={{ .Commit }}
      - -X github.com/daxchain-io/evm-tools/internal/buildinfo.Date={{ .Date }}

  - id: evm-sink-postgres
    main: ./cmd/evm-sink-postgres
    binary: evm-sink-postgres
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/daxchain-io/evm-tools/internal/buildinfo.Version={{ .Version }}
      - -X github.com/daxchain-io/evm-tools/internal/buildinfo.Commit={{ .Commit }}
      - -X github.com/daxchain-io/evm-tools/internal/buildinfo.Date={{ .Date }}

# One archive bundles all eight binaries, so a single `brew install` / `curl`
# install delivers the whole suite (evm-stream, evm-balance, and the sinks).
archives:
  - id: evm-tools
    ids:
      - evm-stream
      - evm-balance
      - evm-sink-kafka
      - evm-sink-webhook
      - evm-sink-file
      - evm-sink-aws-sqs
      - evm-sink-aws-sns
      - evm-sink-postgres
    name_template: "evm-tools_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# Keyless cosign signing of the checksums file via GitHub OIDC. The release
# workflow grants id-token: write so this needs no stored key. The signing is
# delegated to scripts/cosign-sign.sh, which signs only when a keyless OIDC
# identity (GitHub Actions) or a COSIGN_PRIVATE_KEY fallback is present and
# otherwise skips with a clear message — so a local `goreleaser release
# --snapshot --clean` dry-run stays offline-safe while real tagged releases in
# CI still sign. (GoReleaser's `signs` block has no per-snapshot skip, so the
# conditional lives in the wrapper.)
signs:
  - id: cosign-keyless
    cmd: sh
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - scripts/cosign-sign.sh
      - "${artifact}"
      - "${signature}"
      - "${certificate}"
    artifacts: checksum
    output: true

# Publish the universal installer as a release asset so the
# releases/latest/download/install.sh URL resolves.
release:
  github:
    owner: daxchain-io
    name: evm-tools
  extra_files:
    - glob: ./install.sh

# The Daxchain tap standardizes on Homebrew casks for pre-compiled binaries,
# which is GoReleaser's supported path (the old "brews" formula generator is
# deprecated). See docs/design.md "Release and Distribution" — formulae "unless
# the tap standardizes on casks for all Daxchain tools".
# A single `evm-tools` cask installs the whole suite:
#   brew install --cask daxchain-io/tap/evm-tools
homebrew_casks:
  - name: evm-tools
    ids:
      - evm-tools
    repository:
      owner: daxchain-io
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/daxchain-io/evm-tools"
    description: "Composable CLIs for observing EVM chains and streaming records as JSONL (evm-stream, evm-balance, and sinks for Kafka, webhooks, files, AWS SQS/SNS, and PostgreSQL)"
    binaries:
      - evm-stream
      - evm-balance
      - evm-sink-kafka
      - evm-sink-webhook
      - evm-sink-file
      - evm-sink-aws-sqs
      - evm-sink-aws-sns
      - evm-sink-postgres
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr",
                           args: ["-dr", "com.apple.quarantine", "#{staged_path}"]
          end

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"
