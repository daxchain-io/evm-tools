{{- include "evm-stream.validateSinks" . }}
{{- if .Values.metrics.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "evm-stream.fullname" . }}-metrics
  labels:
    {{- include "evm-stream.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "evm-stream.selectorLabels" . | nindent 4 }}
  ports:
    - name: producer
      port: {{ .Values.metrics.port }}
      targetPort: {{ .Values.metrics.port }}
    {{- range .Values.sinks }}
    - name: sink-{{ .name | trunc 56 | trimSuffix "-" }}
      port: {{ .metricsPort }}
      targetPort: {{ .metricsPort }}
    {{- end }}
{{- end }}
