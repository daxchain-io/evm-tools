{{- if and (not .Values.rpc.existingSecret) (not .Values.rpc.url) }}
{{- fail "evm-stream: set rpc.existingSecret (preferred) or rpc.url to provide the RPC endpoint" }}
{{- end }}
{{- if gt (int .Values.replicaCount) 1 }}
{{- fail "evm-stream: replicaCount must be 1 — a producer is a singleton per chain (a second active replica would double-emit). Run a separate release per chain." }}
{{- end }}
{{- include "evm-stream.validateSinks" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "evm-stream.fullname" . }}
  labels:
    {{- include "evm-stream.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "evm-stream.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "evm-stream.selectorLabels" . | nindent 8 }}
      annotations:
        # Roll the pod when the rendered config (producer or any sink) changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if .Values.metrics.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.metrics.port | quote }}   # producer; scrape sinks via the Service / a ServiceMonitor
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      volumes:
        {{- if gt (len .Values.sinks) 0 }}
        - name: ipc                  # the shared record socket; only needed with a sink
          emptyDir: {}
        {{- end }}
        - name: config
          configMap:
            name: {{ include "evm-stream.fullname" . }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      containers:
        - name: evm-stream
          image: {{ include "evm-stream.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          args:
            - evm-stream
            - run
            - --config=/etc/evm-tools/evm-tools.toml
            {{- if gt (len .Values.sinks) 0 }}
            - --output=unix:/run/evm/records.sock
            {{- end }}
            - --log-level={{ .Values.log.level }}
            - --log-format={{ .Values.log.format }}
            {{- if .Values.metrics.enabled }}
            - --metrics
            - --metrics-addr=:{{ .Values.metrics.port }}
            {{- end }}
          env:
            - name: RPC_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "evm-stream.rpcSecretName" . }}
                  key: {{ include "evm-stream.rpcSecretKey" . }}
          {{- if .Values.metrics.enabled }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.metrics.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.metrics.port }}
            initialDelaySeconds: 10
            periodSeconds: 20
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/evm-tools
              readOnly: true
            {{- if gt (len .Values.sinks) 0 }}
            - name: ipc
              mountPath: /run/evm
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        {{- range $s := .Values.sinks }}
        # sink sidecar — dials the shared socket (records fan out to every sink).
        # A sink consumes records only; it carries its OWN config/secrets (env,
        # envFrom, config) and has no RPC — unlike the producer.
        - name: sink-{{ $s.name }}
          image: {{ include "evm-stream.image" $ | quote }}
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          {{- with $.Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          args:
            - {{ $s.tool }}
            - run
            {{- if $s.config }}
            - --config=/etc/evm-tools/sink-{{ $s.name }}.toml
            {{- end }}
            - --input=unix:/run/evm/records.sock
            - --log-level={{ $.Values.log.level }}
            - --log-format={{ $.Values.log.format }}
            - --metrics
            - --metrics-addr=:{{ $s.metricsPort }}
            {{- range $s.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          {{- with $s.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $s.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: p{{ $s.metricsPort }}
              containerPort: {{ $s.metricsPort }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ $s.metricsPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            {{- if $s.config }}
            - name: config
              mountPath: /etc/evm-tools
              readOnly: true
            {{- end }}
            - name: ipc
              mountPath: /run/evm
            {{- with $s.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with $s.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
