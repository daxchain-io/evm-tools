{{- if and (not .Values.rpc.existingSecret) (not .Values.rpc.url) }}
{{- fail "evm-stream: set rpc.existingSecret (preferred) or rpc.url to provide the RPC endpoint" }}
{{- end }}
{{- if gt (int .Values.replicaCount) 1 }}
{{- fail "evm-stream: replicaCount must be 1 — a producer is a singleton per chain (a second active replica would double-emit). Run a separate release per chain." }}
{{- end }}
{{- include "evm-stream.validateSinks" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "evm-stream.fullname" . }}
  labels:
    {{- include "evm-stream.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "evm-stream.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "evm-stream.selectorLabels" . | nindent 8 }}
      annotations:
        {{- if .Values.metrics.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.metrics.port | quote }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      volumes:
        - name: ipc
          emptyDir: {}
        - name: config
          configMap:
            name: {{ include "evm-stream.fullname" . }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      containers:
        - name: evm-stream
          image: {{ include "evm-stream.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - evm-stream
            - run
            - --config=/etc/evm-tools/evm-tools.toml
            {{- if gt (len .Values.sinks) 0 }}
            - --output=unix:/run/evm/records.sock
            {{- end }}
            - --log-level={{ .Values.log.level }}
            - --log-format={{ .Values.log.format }}
            {{- if .Values.metrics.enabled }}
            - --metrics
            - --metrics-addr=:{{ .Values.metrics.port }}
            {{- end }}
          env:
            - name: RPC_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "evm-stream.rpcSecretName" . }}
                  key: {{ include "evm-stream.rpcSecretKey" . }}
          {{- if .Values.metrics.enabled }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.metrics.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.metrics.port }}
            initialDelaySeconds: 10
            periodSeconds: 20
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/evm-tools
              readOnly: true
            {{- if gt (len .Values.sinks) 0 }}
            - name: ipc
              mountPath: /run/evm
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        {{- range .Values.sinks }}
        # sink sidecar — dials the shared socket; the producer's writer fans out to
        # every connected sink, so each gets the full record stream.
        - name: sink-{{ .name }}
          image: {{ include "evm-stream.image" $ | quote }}
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          args:
            - {{ .tool }}
            - run
            - --config=/etc/evm-tools/sink-{{ .name }}.toml
            - --input=unix:/run/evm/records.sock
            - --log-level={{ $.Values.log.level }}
            - --log-format={{ $.Values.log.format }}
            - --metrics
            - --metrics-addr=:{{ .metricsPort }}
            {{- range .extraArgs }}
            - {{ . | quote }}
            {{- end }}
          env:
            - name: RPC_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "evm-stream.rpcSecretName" $ }}
                  key: {{ include "evm-stream.rpcSecretKey" $ }}
          ports:
            - name: p{{ .metricsPort }}
              containerPort: {{ .metricsPort }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .metricsPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/evm-tools
              readOnly: true
            - name: ipc
              mountPath: /run/evm
            {{- with .volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .resources | nindent 12 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
