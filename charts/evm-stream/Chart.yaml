apiVersion: v2
name: evm-stream
description: >-
  evm-stream producer (with one or more optional sink sidecars) — observe live EVM
  contract events and native transfers, emit JSONL records over a Unix socket to the
  sinks, log to stdout/stderr, and expose Prometheus metrics. The cloud-native
  sidecar pattern: producer + sinks in one pod, records over a shared-volume socket.
type: application
# version, appVersion, and the image tag are locked together: the release tag is
# the source of truth and overrides both at publish time (publish-packages.yml).
version: 2.4.1
appVersion: "2.4.1"
keywords:
  - ethereum
  - evm
  - blockchain
  - prometheus
  - observability
home: https://github.com/daxchain-io/evm-tools
sources:
  - https://github.com/daxchain-io/evm-tools
maintainers:
  - name: daxchain-io
