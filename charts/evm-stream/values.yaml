# Default values for evm-stream.

image:
  repository: ghcr.io/daxchain-io/images/evm-tools
  # tag defaults to the chart appVersion (2.1.2) when empty.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

# A producer is a singleton per chain (HA = exactly one active). Do NOT set > 1 —
# a second active producer would double-emit. Run a separate release per chain.
replicaCount: 1

# RPC endpoint. It usually carries an API key, so it lives in a Secret.
rpc:
  # Reference an existing Secret holding the URL (preferred). Leave empty to have
  # the chart create one from `rpc.url` below.
  existingSecret: ""
  existingSecretKey: RPC_URL
  # Used only when existingSecret is empty: the chart creates a Secret from this.
  # For real deployments prefer existingSecret; for a quick test:
  #   helm install evm-stream … --set rpc.url="$RPC_URL"
  url: ""

# chain is the record/metric label; omit to derive it from the resolved chain id.
chain: ethereum

# evm-stream configuration (rendered into the pod's evm-tools.toml).
stream:
  pollInterval: 3s
  nativeTransfers:
    enabled: false
    includeInternal: false
  # Each entry becomes a [[stream.contracts]] block.
  contracts:
    - name: usdt
      address: "0xdAC17F958D2ee523a2206206994597C13D831ec7"
      events: [Transfer]
  # Raw TOML appended verbatim under [stream] (escape hatch for advanced keys).
  extraConfig: ""

# Producer Prometheus/health endpoint (/metrics, /healthz, /readyz).
metrics:
  enabled: true
  port: 9000

log:
  level: info
  format: json

# Sink sidecars. Each entry renders one sidecar container named `sink-<name>` that
# dials the producer's socket and delivers records. The socket FANS OUT, so every
# sink receives the full record stream. Run as many as you like — including
# duplicates of the same tool (e.g. two evm-sink-file writing different paths);
# that is why each sink needs its own unique `name` and `metricsPort`, and its own
# `config` (rendered to a per-sink TOML so duplicates can differ).
#
# Losslessness with multiple sinks: the producer waits for the FIRST consumer, then
# keeps emitting while ANY sink is connected — so a sink that restarts while another
# stays up misses that gap. For durable per-sink delivery use a broker/DB sink
# (Kafka/Postgres/Redis). An empty list runs the producer exporter-only (no records).
sinks:
  - name: stdout              # unique; becomes container `sink-stdout`
    tool: evm-sink-stdout     # the sink binary; may repeat across entries
    metricsPort: 9009         # unique; must not collide with metrics.port or siblings
    # Extra args appended after `<tool> run` (e.g. --topic for evm-sink-kafka).
    extraArgs: []
    # This sink's own TOML section (e.g. [file], [kafka]). Rendered to a per-sink
    # config file, so two sinks of the same tool can be configured independently.
    config: ""
    # Mount volumes into this sink (e.g. a file sink's output dir). Reference a
    # volume declared in `extraVolumes` below.
    volumeMounts: []
    resources:
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
        memory: 128Mi

# Pod-level volumes made available to sinks (e.g. an emptyDir or PVC for a file
# sink's output). Mount them per-sink via `sinks[].volumeMounts`.
extraVolumes: []

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 256Mi

# Both containers share this UID/GID so the producer's 0600 socket is reachable
# by the sink; fsGroup makes the shared emptyDir writable.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001

service:
  type: ClusterIP
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9000"

nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}
