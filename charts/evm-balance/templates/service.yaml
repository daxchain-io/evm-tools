{{- include "evm-balance.validateSinks" . }}
{{- if .Values.metrics.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "evm-balance.fullname" . }}-metrics
  labels:
    {{- include "evm-balance.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "evm-balance.selectorLabels" . | nindent 4 }}
  ports:
    - name: producer
      port: {{ .Values.metrics.port }}
      targetPort: {{ .Values.metrics.port }}
    {{- range .Values.sinks }}
    # port-derived name: a Service port name is an IANA_SVC_NAME (max 15 chars),
    # which a long sink name would exceed. The port is unique (validateSinks).
    - name: p{{ .metricsPort }}
      port: {{ .metricsPort }}
      targetPort: {{ .metricsPort }}
    {{- end }}
{{- end }}
