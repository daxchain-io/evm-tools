# Default values for evm-balance.

image:
  repository: ghcr.io/daxchain-io/images/evm-tools
  # tag defaults to the chart appVersion (2.1.2) when empty.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

# A producer is a singleton per chain (HA = exactly one active). Do NOT set > 1.
replicaCount: 1

# RPC endpoint. It usually carries an API key, so it lives in a Secret.
rpc:
  existingSecret: ""
  existingSecretKey: RPC_URL
  # Used only when existingSecret is empty; for a quick test:
  #   helm install evm-balance … --set rpc.url="$RPC_URL"
  url: ""

# chain is the record/metric label; omit to derive it from the resolved chain id.
chain: ethereum

# evm-balance configuration (rendered into the pod's evm-tools.toml). Sampling
# cadence is interval XOR everyBlocks.
balance:
  interval: 30s
  # everyBlocks: 0
  # Native-balance targets -> [[balance.native]].
  native:
    - name: weth
      address: "0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2"   # WETH — the most-held, most-active ETH balance
  # ERC-20 balance targets -> [[balance.erc20]] (decimals optional).
  erc20: []
  #  - { name: usdc-treasury, token: "0xA0b8…", address: "0xABCD…", decimals: 6 }
  # Contract-state targets -> [[balance.contracts]].
  contracts: []
  #  - { name: usdc, address: "0xA0b8…", tokenSupply: true, decimals: 6 }
  # Raw TOML appended verbatim under [balance].
  extraConfig: ""

# Producer Prometheus/health endpoint (/metrics, /healthz, /readyz).
metrics:
  enabled: true
  port: 9001

log:
  level: info
  format: json

# Sink sidecars. Each entry renders one sidecar container named `sink-<name>` that
# dials the producer's socket and delivers records. The socket FANS OUT, so every
# sink receives the full record stream. Run as many as you like — including
# duplicates of the same tool (e.g. two evm-sink-file writing different paths);
# that is why each sink needs its own unique `name` and `metricsPort`, and its own
# `config` (rendered to a per-sink TOML so duplicates can differ).
#
# Losslessness with multiple sinks: the producer waits for the FIRST consumer, then
# keeps emitting while ANY sink is connected — so a sink that restarts while another
# stays up misses that gap. For durable per-sink delivery use a broker/DB sink
# (Kafka/Postgres/Redis). An empty list runs the producer exporter-only (no records).
sinks:
  - name: stdout              # unique; becomes container `sink-stdout`
    tool: evm-sink-stdout     # the sink binary; may repeat across entries
    metricsPort: 9009         # unique; must not collide with metrics.port or siblings
    # Args appended after `<tool> run` (e.g. --topic / --queue-url / --path).
    extraArgs: []
    # This sink's own TOML config (its [file]/[kafka]/[aws_sqs]/… section), rendered
    # to sink-<name>.toml and passed via --config. Omit if the sink is fully
    # configured by flags. Sinks do NOT use [rpc]/[chain] — they only consume records.
    config: ""
    # Per-sink environment: each sink brings its OWN secrets/settings (AWS creds, a
    # DB DSN, a Kafka SASL password, …). Standard k8s env entries — pull secret
    # values with valueFrom.secretKeyRef.
    env: []
    #  - name: AWS_REGION
    #    value: us-east-1
    #  - name: AWS_ACCESS_KEY_ID
    #    valueFrom: { secretKeyRef: { name: aws-creds, key: access-key-id } }
    # Or pull whole Secrets/ConfigMaps in as env:
    envFrom: []
    #  - secretRef: { name: aws-creds }
    # Mount volumes into this sink (e.g. a file sink's output dir). Reference a
    # volume declared in `extraVolumes` below.
    volumeMounts: []
    resources:
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
        memory: 128Mi

# Pod-level volumes made available to sinks (e.g. an emptyDir or PVC for a file
# sink's output). Mount them per-sink via `sinks[].volumeMounts`.
extraVolumes: []

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 256Mi

# Both containers share this UID/GID so the producer's 0600 socket is reachable
# by the sink; fsGroup makes the shared emptyDir writable.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001

service:
  type: ClusterIP
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9001"

nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}
