name: Publish packages

# Publishes the container image and the Helm charts to GHCR. Binaries are released
# separately by release.yml (goreleaser); this publishes ONE image
# (ghcr.io/daxchain-io/images/evm-tools) and TWO charts
# (ghcr.io/daxchain-io/charts/evm-stream, .../charts/evm-balance) on each version
# tag, and on demand via workflow_dispatch (so a version can be published
# without cutting a new tag). Uses the in-CI GITHUB_TOKEN — no stored secret.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to tag the packages with (e.g. 2.0.0)"
        required: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version + build date
        id: meta
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            v="${{ github.event.inputs.version }}"
          else
            v="${{ github.ref_name }}"
          fi
          echo "version=${v#v}" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ONE image, multi-arch (CGO-off Go cross-compiles on the native builder).
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/evm-tools/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/daxchain-io/images/evm-tools:${{ steps.meta.outputs.version }}
            ghcr.io/daxchain-io/images/evm-tools:latest
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ github.sha }}
            DATE=${{ steps.meta.outputs.date }}

      - uses: azure/setup-helm@v4

      # TWO charts, as OCI artifacts under the charts/ namespace.
      - name: Package and push charts
        run: |
          set -eux
          helm registry login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"
          mkdir -p dist
          for c in evm-stream evm-balance; do
            helm package "charts/$c" --app-version "${{ steps.meta.outputs.version }}" -d dist
          done
          helm push dist/evm-stream-*.tgz oci://ghcr.io/daxchain-io/charts
          helm push dist/evm-balance-*.tgz oci://ghcr.io/daxchain-io/charts
