name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  # contents: write — create the GitHub Release and upload assets.
  # id-token: write — keyless cosign signing via GitHub OIDC.
  contents: write
  id-token: write

jobs:
  release:
    name: GoReleaser release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Install cosign
        # Pin cosign to the v2 line. The release signs checksums.txt with the
        # legacy DETACHED flow: scripts/cosign-sign.sh writes
        # --output-signature/--output-certificate and install.sh verifies with
        # `cosign verify-blob --signature/--certificate`. That flow depends on
        # cosign's --new-bundle-format defaulting OFF. cosign 3.0 flips that
        # default ON, where a bare sign-blob ignores --output-* and fails the
        # signing step (no checksums.txt.sig/.pem). cosign-installer@v3 only
        # serves cosign 2.x (cosign 3.x needs cosign-installer@v4), but pin the
        # exact release so the version can't drift onto an incompatible default.
        # To adopt cosign 3.x, migrate cosign-sign.sh AND install.sh to the
        # --bundle/--new-bundle-format flow together (see scripts/cosign-sign.sh).
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: "v2.6.3"

      - name: GoReleaser release
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # The default GITHUB_TOKEN cannot push to the separate tap repo, so the
          # tap update needs its own credential. Provisioning this secret is a
          # maintainer task (see docs/plan.md M3).
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

  homebrew-install:
    name: Homebrew install smoke
    needs: release
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Install evm-tools from the Daxchain tap
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"

          brew uninstall --cask --force evm-tools >/dev/null 2>&1 || true
          brew untap daxchain-io/tap >/dev/null 2>&1 || true

          for attempt in $(seq 1 30); do
            brew tap daxchain-io/tap

            if brew info daxchain-io/tap/evm-tools | grep -Eq "evm-tools.*: ${version}"; then
              break
            fi

            if [ "$attempt" -eq 30 ]; then
              echo "::error::daxchain-io/tap/evm-tools did not update to ${version}" >&2
              brew info daxchain-io/tap/evm-tools || true
              exit 1
            fi

            brew untap daxchain-io/tap >/dev/null 2>&1 || true
            sleep 10
          done

          if brew help trust >/dev/null 2>&1; then
            brew trust --cask daxchain-io/tap/evm-tools || true
          fi

          brew install --cask daxchain-io/tap/evm-tools

          for bin in evm-stream evm-balance evm-sink-kafka evm-sink-webhook evm-sink-stdout; do
            command -v "$bin"
            "$bin" version | grep -q "version: ${version}"
          done

      - name: Uninstall evm-tools cask
        if: always()
        run: brew uninstall --cask --force evm-tools >/dev/null 2>&1 || true
