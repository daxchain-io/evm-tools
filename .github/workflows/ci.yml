name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go build, vet, test, lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Pin the toolchain from go.mod so local, CI, and release builds match.
          go-version-file: go.mod
          check-latest: true

      - name: Verify gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: Verify go mod tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

      - name: Chart templates in lockstep
        run: ./scripts/check-chart-drift.sh

  windows:
    name: Windows build + test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      # Build + vet + test the whole module on Windows, including the go-winio
      # named-pipe backend (the named-pipe path can only be exercised on Windows).
      # Race detection runs on the Linux job above.
      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  integration:
    name: Integration (compose stack)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      # ubuntu-latest ships Docker + the compose plugin. The runner brings the
      # stack up with `--wait` (healthchecks gate readiness), runs the
      # build-tagged live tests against it, and tears it down on exit.
      - name: Run integration suite
        run: make integration

  vuln:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod
          check-latest: true

      # The named-pipe backend (go-winio) is behind //go:build windows, so the
      # default linux scan above never sees it; scan the windows build config too.
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
      - name: govulncheck (windows build config)
        # Install for the host, then run with GOOS set so govulncheck (a host
        # binary) analyzes the windows build config. `go run` with GOOS would
        # cross-build the tool itself and fail to exec on the linux runner.
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          GOOS=windows GOARCH=amd64 "$(go env GOPATH)/bin/govulncheck" ./...

  docs:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "**/*.md"

  shell:
    name: Shell lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: shellcheck install.sh scripts/cosign-sign.sh scripts/brew-cask-smoke.sh scripts/integration.sh

  goreleaser:
    name: GoReleaser check + snapshot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: GoReleaser check
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: check

      # No --skip=sign needed: scripts/cosign-sign.sh detects the absence of a
      # keyless OIDC identity in this non-release job and skips signing, so the
      # packaging dry-run stays green without touching Sigstore.
      - name: GoReleaser snapshot (packaging dry-run)
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --snapshot --clean

      - name: Upload GoReleaser snapshot artifacts
        uses: actions/upload-artifact@v4
        with:
          name: goreleaser-dist
          if-no-files-found: error
          path: |
            dist/evm-tools_*.tar.gz
            dist/homebrew/Casks/evm-tools.rb

  brew-install:
    name: Homebrew cask install (${{ matrix.os }})
    needs: goreleaser
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew
        if: runner.os == 'Linux'
        uses: Homebrew/actions/setup-homebrew@main

      - name: Download GoReleaser snapshot artifacts
        uses: actions/download-artifact@v4
        with:
          name: goreleaser-dist
          path: dist

      - name: Smoke test generated Homebrew cask
        run: scripts/brew-cask-smoke.sh
